<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Week 05 | Daniel Enrique Osorio Flores | WDD 130</title>
    <meta name="description" content="This is the acitvity Quiz Form of week05 of WDD 130 Course">
    <meta name="author" content="Daniel Enrique Osorio Flores">
    <link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
    <header>
        <h1>Basic HTML and CSS Quiz</h1>
    </header>
    <main>
        <form>
            <fieldset>
                <!--Form elements-->
                <div class="form-item column1">
                    <label for="q1">1. What does HTML acronym stands for?</label>
                    <input type="text" name="q1" id="q1">
                </div>
                <div class="form-item column1">
                    <label for="q2">2. How are id and class attributes selected in CSS?</label>
                    <textarea id="q2" name="q2" rows="4" placeholder="                   "></textarea>
                </div>
                <div class="form-item column1">
                    <label for="q3">3. Which of the following is a valid HTML comment?</label>
                    <select id="q3" name="q3">
                        <option value="!-- --">!-- --</option>
                        <option value="/**/">/**/</option>
                        <option value="*Comment*">*Comment*</option>
                    </select>
                </div>
                <div class="form-item column1">
                    <label for="q4">4. What is the bottom margin given this declaration "margin: 10px 5px 15px;" ?</label>
                    <input type="number" name="q4" id="q4">
                </div>
            </fieldset>
            <button type="submit">Submit Quiz</button>
        </form>
    </main>
</body>
</html>
