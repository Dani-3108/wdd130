<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css/poll-form.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato&family=Roboto:wght@500&display=swap" rel="stylesheet">
    <title>WDD 130 | HTML Form - User Poll</title>
</head>
<body>
    <header>
        <h1>WDD 130 | HTML Form - User Poll</h1>
    </header>
    <main>
        <form>
            <fieldset>
                <legend>Contact information</legend>
                <!--form elements will go here-->
                <div class="form-item column2">
                    <label for="fullname">Full Name</label>
                    <input type="text" name="fname" id="fullname">
                </div>
                <div class="form-item column2">
                    <label for="useremail">Email Address</label>
                    <input type="email" name="useremail" id="useremail">
                </div>
                <!--Another way to do it//called implicit label metod -->
                <!--<legend>Contact information</legend>
                <label>Full Name: <input type="text" name="fulllname"></label>
                <label>Email Address: <input type="email" name="useremail"></label>-->
            </fieldset>
            <fieldset>
                <legend>Questions</legend>
                <!--form elements will go here-->
                <div class="form-item column1">
                    <label for="browser">What is your Favorite browser?</label>
                    <select id="browser" name="browser">
                        <option value="Chrome">Google Chrome</option>
                        <option value="Safari">Safari</option>
                        <option value="Firefox">Firefox</option>
                        <option value="Edge">Edge</option>
                        <option value="Brave">Brave</option>
                        <option value="other">Toher</option>
                    </select>
                </div>
                <div class="form-item column1">
                    <label for="pet">Do you have a household pet?</label>
                    <input type="checkbox" name="pet" id="pet">
                </div>
                <label class="feedback" for="feedback">List the places you have lived:</label>
                <textarea id="feedback" name="feedback" rows="4" placeholder="Mexico City Mexico, Vancouver Canada, Millan Itally"></textarea>
            </fieldset>
            <button type="submit">Submit Poll</button>
        </form>
    </main>
    <footer>
        <p>©️ | HTML Form  - User Poll Activity | Daniel Enrique Osorio Flores</p>
    </footer>
</body>
</html>
